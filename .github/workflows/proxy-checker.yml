name: Proxy Checker - Socket Mode

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */3 * * *'

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install aiohttp aiohttp-socks
    
    - name: Run socket-based scanner
      run: python proxy_checker.py
    
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: proxy-results
        path: result.txt
