name: Proxy Checker - High Performance

on:
  schedule:
    # Run every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:  # Manual trigger
  push:
    paths:
      - 'ips.txt'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiohttp aiohttp-socks
        echo "✅ Dependencies installed"
    
    - name: Verify ips.txt
      run: |
        if [ ! -f ips.txt ]; then
          echo "❌ Error: ips.txt not found!"
          echo "Creating sample ips.txt..."
          cat > ips.txt << 'EOF'
        2.57.3.0/24
        2.144.0.0/14
        2.176.0.0/12
        5.1.43.0/24
        5.10.248.0/23
        5.22.0.0/17
        5.22.192.0/21
        5.22.200.0/22
        5.23.112.0/21
        5.34.192.0/20
        EOF
        fi
        echo "📄 ips.txt content:"
        echo "Total lines: $(wc -l < ips.txt)"
        echo "First 10 lines:"
        head -10 ips.txt
    
    - name: Run proxy checker with live output
      id: scanner
      run: |
        echo "🚀 Starting proxy scanner..."
        echo "========================================"
        python proxy_checker.py 2>&1 | tee live_output.log
        echo "========================================"
      shell: bash
    
    - name: Display live results
      if: always()
      run: |
        echo "========================================"
        echo "📡 LIVE SCAN RESULTS"
        echo "========================================"
        cat live_output.log
        echo "========================================"
    
    - name: Show working proxies
      if: always()
      run: |
        echo "========================================"
        echo "✅ WORKING PROXIES (ip:port)"
        echo "========================================"
        if [ -f result.txt ] && [ -s result.txt ]; then
          echo "Total working proxies: $(wc -l < result.txt)"
          echo ""
          echo "First 50 proxies:"
          echo "----------------------------------------"
          head -50 result.txt
          echo "----------------------------------------"
        else
          echo "No working proxies found in this scan"
        fi
    
    - name: Show protocol distribution
      if: always() && success()
      run: |
        if [ -f detailed_results.txt ] && [ -s detailed_results.txt ]; then
          echo ""
          echo "========================================"
          echo "📊 PROTOCOL DISTRIBUTION"
          echo "========================================"
          echo "HTTP/HTTPS/SOCKS4/SOCKS5 breakdown:"
          echo "----------------------------------------"
          grep -E "HTTP|HTTPS|SOCKS" detailed_results.txt | cut -d'|' -f2 | sort | uniq -c | sort -rn
          echo "----------------------------------------"
        fi
    
    - name: Generate summary
      if: always()
      run: |
        cat > summary.md << 'EOF'
        ## 🔍 Proxy Scan Summary
        
        **Scan Time:** $(date '+%Y-%m-%d %H:%M:%S UTC')
        **Status:** ${{ job.status }}
        
        ### Results
        - **Working Proxies:** $(cat result.txt 2>/dev/null | wc -l)
        
        EOF
        
        if [ -f result.txt ] && [ -s result.txt ]; then
          echo "### Top 20 Working Proxies" >> summary.md
          echo '```' >> summary.md
          head -20 result.txt >> summary.md
          echo '```' >> summary.md
        fi
        
        cat summary.md >> $GITHUB_STEP_SUMMARY
    
    - name: Commit and push results
      if: always()
      run: |
        git config --local user.name "GitHub Action"
        git config --local user.email "action@github.com"
        
        # Add result files
        git add result.txt detailed_results.txt live_output.log 2>/dev/null || true
        
        # Check if there are changes
        if git diff --staged --quiet; then
          echo "ℹ️ No changes to commit"
        else
          git commit -m "🤖 Auto-update: Proxy scan results $(date '+%Y-%m-%d %H:%M:%S')"
          git push
          echo "✅ Results pushed to repository"
        fi
    
    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: proxy-scan-results-$(date '+%Y%m%d-%H%M%S')
        path: |
          result.txt
          detailed_results.txt
          live_output.log
        retention-days: 14
        compression-level: 9

    - name: Notify completion
      if: always()
      run: |
        echo "========================================"
        echo "✅ SCAN COMPLETED"
        echo "========================================"
        echo "Check the following files for results:"
        echo "  - result.txt (Simple IP:PORT format)"
        echo "  - detailed_results.txt (With protocol info)"
        echo "  - live_output.log (Complete scan log)"
        echo "========================================"
